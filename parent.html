<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moje Składki</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Nagłówek -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-lg mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex items-center gap-2">
        <span class="text-lg">🏫</span>
        <span class="font-bold text-gray-800 text-sm">Składki Klasowe</span>
      </div>
      <button id="logoutBtn"
        class="text-xs text-gray-400 hover:text-red-500 transition-colors px-3 py-1.5 rounded-lg hover:bg-red-50">
        Wyloguj
      </button>
    </div>
    <!-- Zakładki lat szkolnych -->
    <div class="max-w-lg mx-auto px-4 flex gap-1 pb-2 overflow-x-auto" id="yearTabs"></div>
  </header>

  <!-- Ładowanie -->
  <div id="loadingView" class="flex flex-col items-center justify-center h-64 gap-3">
    <div class="w-10 h-10 border-4 border-blue-200 border-t-blue-500 rounded-full animate-spin"></div>
    <p class="text-gray-400 text-sm">Ładowanie…</p>
  </div>

  <!-- Błąd -->
  <div id="errorView" class="hidden max-w-lg mx-auto px-4 py-10 text-center">
    <div class="text-5xl mb-3">⚠️</div>
    <p id="errorMsg" class="text-red-600 font-medium"></p>
  </div>

  <!-- Główna treść -->
  <main id="mainView" class="hidden max-w-lg mx-auto px-4 py-5 space-y-4">

    <!-- Karta ucznia -->
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 flex items-center gap-4">
      <div class="w-12 h-12 bg-gradient-to-br from-blue-100 to-indigo-100 rounded-full flex items-center justify-center text-xl select-none flex-shrink-0">
        🎒
      </div>
      <div>
        <h2 id="studentName" class="text-lg font-bold text-gray-900"></h2>
        <p id="classLabel" class="text-blue-600 text-sm font-semibold"></p>
      </div>
    </div>

    <!-- Podsumowanie -->
    <div class="grid grid-cols-3 gap-3">
      <div class="bg-green-50 border border-green-100 rounded-xl p-3 text-center">
        <div id="paidCount" class="text-2xl font-bold text-green-600">0</div>
        <div class="text-xs text-green-700 mt-0.5">Opłacone</div>
      </div>
      <div class="bg-red-50 border border-red-100 rounded-xl p-3 text-center">
        <div id="unpaidCount" class="text-2xl font-bold text-red-500">0</div>
        <div class="text-xs text-red-700 mt-0.5">Zaległe</div>
      </div>
      <div class="bg-blue-50 border border-blue-100 rounded-xl p-3 text-center">
        <div id="totalOwed" class="text-2xl font-bold text-blue-600">0 zł</div>
        <div class="text-xs text-blue-700 mt-0.5">Do zapłaty</div>
      </div>
    </div>

    <!-- Karty składek -->
    <div id="contribCards" class="space-y-3"></div>

    <!-- Brak danych -->
    <div id="emptyState" class="hidden text-center py-12 text-gray-400">
      <div class="text-4xl mb-2">📋</div>
      <p class="text-sm">Brak składek w tym roku szkolnym</p>
    </div>

    <p class="text-center text-xs text-gray-400 pb-4">
      Dane aktualizowane przez skarbnika klasy.
    </p>
  </main>

  <script>
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();

    // ── Automatyczne wylogowanie po 2h braku aktywności ───
    (function setupSessionTimeout() {
      const TIMEOUT_MS = 1 * 60 * 60 * 1000;
      const KEY = 'skarbnik_last_activity';
      let signingOut = false;
      function touch() { if (!signingOut) localStorage.setItem(KEY, Date.now()); }
      function checkTimeout() {
        const last = parseInt(localStorage.getItem(KEY) || '0');
        if (last && Date.now() - last > TIMEOUT_MS) {
          signingOut = true;
          localStorage.removeItem(KEY);
          auth.signOut().then(() => { window.location.href = 'index.html'; });
        }
      }
      checkTimeout();
      ['click','keydown','mousemove','touchstart','scroll'].forEach(e =>
        document.addEventListener(e, touch, { passive: true })
      );
      touch();
      setInterval(checkTimeout, 60_000);
    })();

    // ── Konfiguracja klas ─────────────────────────────────
    // Zmień jeśli klasa zaczęła naukę w innym roku
    const STARTING_YEAR  = "2025-2026"; // Kl.1 = ten rok szkolny
    const STARTING_CLASS = 1;

    // ── Helpers ───────────────────────────────────────────
    function currentSchoolYear() {
      const d = new Date(), m = d.getMonth()+1, y = d.getFullYear();
      return m >= 9 ? `${y}-${y+1}` : `${y-1}-${y}`;
    }
    function getClassLabel(schoolYear) {
      const [sa] = STARTING_YEAR.split('-').map(Number);
      const [ya] = schoolYear.split('-').map(Number);
      const g = STARTING_CLASS + (ya - sa);
      return (g >= 1 && g <= 8) ? `Klasa ${g}` : fmtYear(schoolYear);
    }
    function fmtYear(sy) { const [a,b] = sy.split('-'); return `${a}/${b}`; }
    function fmtDate(ts) {
      if (!ts) return '—';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('pl-PL', {day:'2-digit', month:'2-digit', year:'numeric'});
    }
    function showMain() {
      document.getElementById('loadingView').classList.add('hidden');
      document.getElementById('mainView').classList.remove('hidden');
    }
    function showError(msg) {
      document.getElementById('loadingView').classList.add('hidden');
      document.getElementById('errorMsg').textContent = msg;
      document.getElementById('errorView').classList.remove('hidden');
    }

    let studentId = null;
    let selectedYear = currentSchoolYear();

    document.getElementById('logoutBtn').addEventListener('click', () =>
      auth.signOut().then(() => window.location.href = 'index.html')
    );

    // ── Zakładki lat szkolnych ────────────────────────────
    async function buildYearTabs(email) {
      // Załaduj wszystkie lata z płatnościami tego ucznia
      const pSnap = await db.collection('payments').where('studentId','==',studentId).get();
      const years = new Set([currentSchoolYear()]);
      pSnap.docs.forEach(d => { if (d.data().schoolYear) years.add(d.data().schoolYear); });
      const sortedYears = [...years].sort();

      const tabs = document.getElementById('yearTabs');
      tabs.innerHTML = '';
      sortedYears.forEach(sy => {
        const btn = document.createElement('button');
        btn.textContent = getClassLabel(sy);
        btn.className = `flex-shrink-0 px-3 py-1 rounded-lg text-sm font-semibold transition-colors ${
          sy === selectedYear
          ? 'bg-blue-500 text-white'
          : 'text-gray-500 hover:bg-gray-100'
        }`;
        btn.onclick = () => { selectedYear = sy; buildYearTabs(email); loadContribs(); };
        tabs.appendChild(btn);
      });
    }

    // ── Ładowanie składek ─────────────────────────────────
    async function loadContribs() {
      const cards = document.getElementById('contribCards');
      const empty = document.getElementById('emptyState');
      cards.innerHTML = '<div class="text-center py-8 text-gray-300 text-2xl">⏳</div>';
      empty.classList.add('hidden');

      const cSnap = await db.collection('contributions')
        .where('schoolYear','==', selectedYear)
        .where('active','==', true)
        .orderBy('dueDate','asc').get();

      if (cSnap.empty) {
        cards.innerHTML = '';
        empty.classList.remove('hidden');
        updateSummary([], {});
        return;
      }

      const contribs = cSnap.docs.map(d => ({id: d.id, ...d.data()}));

      const pSnap = await db.collection('payments')
        .where('studentId','==', studentId)
        .where('schoolYear','==', selectedYear).get();
      const pMap = {};
      pSnap.docs.forEach(d => { pMap[d.data().contribId] = d.data(); });

      cards.innerHTML = '';
      contribs.forEach(c => {
        const pmt  = pMap[c.id];
        const paid = pmt && pmt.paid;

        const card = document.createElement('div');
        card.className = `rounded-2xl border-2 p-4 ${
          paid
          ? 'bg-green-50 border-green-200'
          : 'bg-red-50 border-red-200'
        }`;
        card.innerHTML = `
          <div class="flex justify-between items-start gap-3">
            <div class="flex-1 min-w-0">
              <div class="font-bold text-gray-800 text-sm">${c.name}</div>
              ${c.transferTitle
                ? `<div class="text-xs text-gray-500 mt-0.5">Tytuł przelewu: <span class="font-mono font-semibold text-gray-700">${c.transferTitle}</span></div>`
                : ''}
              ${c.description
                ? `<div class="text-xs text-gray-400 mt-0.5">${c.description}</div>`
                : ''}
            </div>
            <span class="flex-shrink-0 text-lg font-bold ${paid ? 'text-green-700' : 'text-red-600'} whitespace-nowrap">
              ${c.amount} zł
            </span>
          </div>
          <div class="flex items-center justify-between mt-3 pt-3 border-t ${paid ? 'border-green-200' : 'border-red-200'}">
            <div class="text-xs text-gray-500">
              Termin: <span class="font-medium">${fmtDate(c.dueDate)}</span>
            </div>
            <div class="flex items-center gap-2">
              ${paid && pmt.paidDate
                ? `<span class="text-xs text-green-600">wpłata: ${fmtDate(pmt.paidDate)}</span>`
                : ''}
              <span class="text-xs font-bold px-2.5 py-1 rounded-full ${
                paid
                ? 'bg-green-200 text-green-800'
                : 'bg-red-200 text-red-800'
              }">
                ${paid ? '✓ OPŁACONA' : '✗ ZALEGA'}
              </span>
            </div>
          </div>
        `;
        cards.appendChild(card);
      });

      updateSummary(contribs, pMap);
    }

    function updateSummary(contribs, pMap) {
      let paid=0, unpaid=0, owed=0;
      contribs.forEach(c => {
        const p = pMap[c.id];
        if (p && p.paid) { paid++; }
        else { unpaid++; owed += (c.amount || 0); }
      });
      document.getElementById('paidCount').textContent   = paid;
      document.getElementById('unpaidCount').textContent  = unpaid;
      document.getElementById('totalOwed').textContent   = owed + ' zł';
    }

    // ── Auth ──────────────────────────────────────────────
    auth.onAuthStateChanged(async (user) => {
      if (!user) { window.location.href = 'index.html'; return; }
      try {
        const snap = await db.collection('students')
          .where('parentEmails','array-contains', user.email.toLowerCase())
          .where('active','==',true).limit(1).get();
        if (snap.empty) { showError('Nie znaleziono danych Twojego dziecka.'); return; }

        studentId = snap.docs[0].id;
        const s   = snap.docs[0].data();
        document.getElementById('studentName').textContent  = `${s.firstName} ${s.lastName}`;
        document.getElementById('classLabel').textContent   = getClassLabel(selectedYear);

        await buildYearTabs(user.email);
        await loadContribs();
        showMain();
      } catch(e) { showError('Błąd: ' + e.message); }
    });
  </script>
</body>
</html>
